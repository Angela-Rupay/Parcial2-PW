<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acomodador</title>
    <link rel="stylesheet" href="/css/Style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>

<header>Sistema de Parqueadero</header>

<div class="container">
    <div class="card">
        <i class="bi bi-car-front-fill icono"></i>
        <h2>Panel Acomodador</h2>
        <p>Gestión de ubicación de vehículos</p>

        <div class="nav-links">
            <form action="#">
                <button type="submit">Registrar Vehículo</button>
            </form>
            <form action="#">
                <button type="submit">Gestionar Tipos</button>
            </form>
            <form action="#">
                <button type="submit">Ver Registros</button>
            </form>
            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit">Cerrar Sesión</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
